name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build
        env:
          SITE_URL: https://pystaci.github.io/pseo-service
      - name: Post-process sitemaps for GitHub Pages base path
        run: |
          sed -i 's|https://pystaci.github.io/|https://pystaci.github.io/pseo-service/|g' dist/sitemap-*.xml dist/sitemap-index.xml || true
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
